name: ridesafe
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Replaced BLE with Bluetooth Classic
  flutter_bluetooth_serial: ^0.4.0

  permission_handler: ^11.3.0
  flutter_phone_direct_caller: ^2.1.1
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6
  geolocator: ^11.0.0
  url_launcher: ^6.2.6
  flutter_tts: ^3.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"